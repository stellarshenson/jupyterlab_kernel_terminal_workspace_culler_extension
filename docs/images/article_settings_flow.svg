<!--
  article_settings_flow.svg - Settings lifecycle from UI to backend culler
  Shows: linear flow from Settings Editor through frontend sync to backend ResourceCuller
  Intent: visualize the settings pipeline and what each configurable option controls
  Theme: Stellars-Tech KGF - #0096d1 (teal), #da8230 (orange)
-->
<!--
  === GRID ===
  ViewBox: 800 x 200

  Horizontal layout: 4 stages left-to-right with 34px gaps
    Stage 1 (Settings UI):    x=20..170  (w=150)
    gap: 170..204 (34px)
    Stage 2 (Frontend sync):  x=204..370 (w=166)
    gap: 370..404 (34px)
    Stage 3 (Backend culler): x=404..586 (w=182)
    gap: 586..620 (34px)
    Stage 4 (Result):         x=620..780 (w=160)

  Rows:
    title: y=14
    cards: y=28..170
    legend: y=186

  Arrow: g translate(tipX,cy) rotate(0), stem x1=-34 x2=-10, head 0,0 -10,-4 -10,4
  Card cy=99 (midpoint of y=28..170)
-->
<!--
  === LAYOUT TOPOLOGY ===
  h-stack: [settings-ui] -> [frontend-sync] -> [backend-culler] -> [result]
  linear pipeline flow left to right
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <style>
      .fg-1 { fill: #1a5a6e; }
      .fg-2 { fill: #24697e; }
      .fg-3 { fill: #236a74; }
      .fg-4 { fill: #2b7680; }
      .accent-1 { fill: #005f7a; }
      .accent-2 { fill: #7a4a15; }
      @media (prefers-color-scheme: dark) {
        .fg-1 { fill: #b8e4f0; }
        .fg-2 { fill: #8fd4e6; }
        .fg-3 { fill: #5aafc5; }
        .fg-4 { fill: #4099b3; }
        .accent-1 { fill: #5cc8e0; }
        .accent-2 { fill: #d4a04a; }
      }
    </style>
  </defs>

  <g id="guide-grid" display="none">
    <line x1="0" y1="99" x2="800" y2="99" stroke="blue" stroke-width="0.5"/>
  </g>

  <!-- Title -->
  <text x="400" y="14" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" class="fg-2" text-anchor="middle" letter-spacing="1">SETTINGS LIFECYCLE</text>

  <!-- ================================================================ -->
  <!-- Stage 1: Settings UI (orange - user-facing) -->
  <!-- ================================================================ -->
  <g id="settings-ui">
    <path d="M20,28 H170 V167 Q170,170 167,170 H23 Q20,170 20,167 Z" fill="#da8230" fill-opacity="0.04"/>
    <path d="M20,28 H170 V167 Q170,170 167,170 H23 Q20,170 20,167 Z" fill="none" stroke="#da8230" stroke-width="1"/>
    <rect x="20" y="28" width="150" height="5" fill="#da8230" opacity="0.6"/>

    <text x="95" y="50" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" class="fg-1" text-anchor="middle">Settings Editor</text>

    <circle cx="32" cy="68" r="2.5" fill="#da8230" opacity="0.5"/>
    <text x="42" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-3">Kernel timeout</text>

    <circle cx="32" cy="84" r="2.5" fill="#da8230" opacity="0.5"/>
    <text x="42" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-3">Terminal timeout</text>

    <circle cx="32" cy="100" r="2.5" fill="#da8230" opacity="0.5"/>
    <text x="42" y="104" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-3">Disconnected only</text>

    <circle cx="32" cy="116" r="2.5" fill="#da8230" opacity="0.5"/>
    <text x="42" y="120" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-3">Workspace timeout</text>

    <circle cx="32" cy="132" r="2.5" fill="#da8230" opacity="0.5"/>
    <text x="42" y="136" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-3">Check interval</text>

    <circle cx="32" cy="148" r="2.5" fill="#da8230" opacity="0.5"/>
    <text x="42" y="152" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-3">Notifications</text>

    <text x="95" y="166" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4" text-anchor="middle">ISettingRegistry</text>
  </g>

  <!-- Arrow 1->2 -->
  <g transform="translate(204, 99) rotate(0)">
    <line x1="-34" y1="0" x2="-10" y2="0" stroke="#0096d1" stroke-width="1.2"/>
    <polygon points="0,0 -10,-4 -10,4" fill="#0096d1"/>
  </g>
  <text x="187" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4" text-anchor="middle">onChange</text>

  <!-- ================================================================ -->
  <!-- Stage 2: Frontend Sync (teal) -->
  <!-- ================================================================ -->
  <g id="frontend-sync">
    <path d="M204,28 H370 V167 Q370,170 367,170 H207 Q204,170 204,167 Z" fill="#0096d1" fill-opacity="0.04"/>
    <path d="M204,28 H370 V167 Q370,170 367,170 H207 Q204,170 204,167 Z" fill="none" stroke="#0096d1" stroke-width="1"/>
    <rect x="204" y="28" width="166" height="5" fill="#0096d1" opacity="0.6"/>

    <text x="287" y="50" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" class="fg-1" text-anchor="middle">Frontend Sync</text>

    <text x="287" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">Read composite settings</text>
    <text x="287" y="90" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">Store showNotifications</text>
    <text x="287" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">Store cullCheckInterval</text>

    <line x1="216" y1="120" x2="358" y2="120" stroke="#0096d1" stroke-width="0.5" opacity="0.2"/>

    <text x="287" y="138" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">POST /settings</text>
    <text x="287" y="154" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">Restart intervals if</text>
    <text x="287" y="166" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">check interval changed</text>
  </g>

  <!-- Arrow 2->3 -->
  <g transform="translate(404, 99) rotate(0)">
    <line x1="-34" y1="0" x2="-10" y2="0" stroke="#0096d1" stroke-width="1.2"/>
    <polygon points="0,0 -10,-4 -10,4" fill="#0096d1"/>
  </g>
  <text x="387" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4" text-anchor="middle">HTTP POST</text>

  <!-- ================================================================ -->
  <!-- Stage 3: Backend Culler (teal) -->
  <!-- ================================================================ -->
  <g id="backend-culler">
    <path d="M404,28 H586 V167 Q586,170 583,170 H407 Q404,170 404,167 Z" fill="#0096d1" fill-opacity="0.04"/>
    <path d="M404,28 H586 V167 Q586,170 583,170 H407 Q404,170 404,167 Z" fill="none" stroke="#0096d1" stroke-width="1"/>
    <rect x="404" y="28" width="182" height="5" fill="#0096d1" opacity="0.6"/>

    <text x="495" y="50" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" class="fg-1" text-anchor="middle">ResourceCuller</text>

    <text x="495" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">camelCase -> snake_case</text>
    <text x="495" y="90" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">Update internal settings</text>
    <text x="495" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">Restart PeriodicCallback</text>

    <line x1="416" y1="120" x2="574" y2="120" stroke="#0096d1" stroke-width="0.5" opacity="0.2"/>

    <text x="495" y="138" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">New interval takes effect</text>
    <text x="495" y="154" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">on next check cycle</text>
  </g>

  <!-- Arrow 3->4 -->
  <g transform="translate(620, 99) rotate(0)">
    <line x1="-34" y1="0" x2="-10" y2="0" stroke="#da8230" stroke-width="1.2"/>
    <polygon points="0,0 -10,-4 -10,4" fill="#da8230"/>
  </g>
  <text x="603" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4" text-anchor="middle">cull cycle</text>

  <!-- ================================================================ -->
  <!-- Stage 4: Result (orange) -->
  <!-- ================================================================ -->
  <g id="result">
    <path d="M620,28 H780 V167 Q780,170 777,170 H623 Q620,170 620,167 Z" fill="#da8230" fill-opacity="0.04"/>
    <path d="M620,28 H780 V167 Q780,170 777,170 H623 Q620,170 620,167 Z" fill="none" stroke="#da8230" stroke-width="1"/>
    <rect x="620" y="28" width="160" height="5" fill="#da8230" opacity="0.6"/>

    <text x="700" y="50" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" class="fg-1" text-anchor="middle">Active Culling</text>

    <text x="700" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">Kernels checked</text>
    <text x="700" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">every N minutes</text>

    <line x1="632" y1="100" x2="768" y2="100" stroke="#da8230" stroke-width="0.5" opacity="0.2"/>

    <text x="700" y="118" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">Terminals checked</text>
    <text x="700" y="134" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">with tab awareness</text>

    <line x1="632" y1="146" x2="768" y2="146" stroke="#da8230" stroke-width="0.5" opacity="0.2"/>

    <text x="700" y="162" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">Workspaces by age</text>
  </g>

  <!-- Legend -->
  <text x="12" y="190" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4">Settings changes take effect on the next cull cycle - no restart required. Frontend and backend intervals restart automatically.</text>

</svg>
