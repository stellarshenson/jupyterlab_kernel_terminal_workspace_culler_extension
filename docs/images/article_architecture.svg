<!--
  architecture.svg - Two-halves architecture of the JupyterLab Resource Culler extension
  Shows: Frontend and Backend containers with HTTP arrows through a central routing channel
  Intent: visualize extension architecture for the Medium article
  Theme: Stellars-Tech KGF - #0096d1 (teal), #da8230 (orange)
  Card shape: flat top, rounded bottom r=3
-->
<!--
  === GRID ===
  ViewBox: 800 x 306

  Containers:
    col-frontend:  x=12..340  (w=328)
    col-channel:   x=340..460 (w=120, routing + labels)
    col-backend:   x=460..788 (w=328)

  Frontend cards (15px inner margin):
    Settings Sync:    x=27..166  (w=139), y=72..152
    Terminal Tracker:  x=180..326 (w=146), y=72..152
    Cull Results:      x=27..166,          y=162..240
    Interval Manager:  x=180..326,         y=162..240
    Card column gap:   x=166..180 (14px)
    Card row gap:      y=152..162 (10px)

  Backend cards (15px inner margin):
    ResourceCuller:  x=475..645  (w=170), y=72..185
    HTTP Routes:     x=659..774  (w=115), y=72..185
    State:           x=475..774  (w=299), y=195..270

  Channel arrows (all labels centred at x=400):
    Arrow 1 (POST /settings):       y=155, x=166..475
    Arrow 2 (POST /active-terms):   y=112, x=326..475
    Arrow 3 (GET /cull-result):     y=252, x=475..166 (reverse)

  Legend: y=292
-->
<!--
  === LAYOUT TOPOLOGY ===
  [frontend-container] | channel | [backend-container]
  channel carries: POST /settings, POST /active-terminals, GET /cull-result
  cards member-of their respective containers
  arrows route through channel with callout labels centred in channel
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 306">
  <defs>
    <style>
      .fg-1 { fill: #1a5a6e; }
      .fg-2 { fill: #24697e; }
      .fg-3 { fill: #236a74; }
      .fg-4 { fill: #2b7680; }
      .accent-1 { fill: #005f7a; }
      .accent-2 { fill: #7a4a15; }
      @media (prefers-color-scheme: dark) {
        .fg-1 { fill: #b8e4f0; }
        .fg-2 { fill: #8fd4e6; }
        .fg-3 { fill: #5aafc5; }
        .fg-4 { fill: #4099b3; }
        .accent-1 { fill: #5cc8e0; }
        .accent-2 { fill: #d4a04a; }
      }
    </style>
  </defs>

  <g id="guide-grid" display="none">
    <line x1="12"  y1="0" x2="12"  y2="306" stroke="red" stroke-width="0.5"/>
    <line x1="340" y1="0" x2="340" y2="306" stroke="red" stroke-width="0.5"/>
    <line x1="460" y1="0" x2="460" y2="306" stroke="red" stroke-width="0.5"/>
    <line x1="788" y1="0" x2="788" y2="306" stroke="red" stroke-width="0.5"/>
    <line x1="0" y1="30"  x2="800" y2="30"  stroke="blue" stroke-width="0.5"/>
    <line x1="0" y1="280" x2="800" y2="280" stroke="blue" stroke-width="0.5"/>
  </g>

  <!-- Title -->
  <text x="400" y="18" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600" class="fg-2" text-anchor="middle" letter-spacing="1">EXTENSION ARCHITECTURE</text>

  <!-- ================================================================ -->
  <!-- FRONTEND CONTAINER x=12..340 -->
  <!-- ================================================================ -->
  <g id="frontend-container">
    <path d="M12,30 H340 V277 Q340,280 337,280 H15 Q12,280 12,277 Z" fill="#0096d1" fill-opacity="0.02"/>
    <path d="M12,30 H340 V277 Q340,280 337,280 H15 Q12,280 12,277 Z" fill="none" stroke="#0096d1" stroke-width="0.8" opacity="0.25"/>
    <rect x="12" y="30" width="328" height="4" fill="#0096d1" opacity="0.15"/>
    <text x="22" y="50" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" class="accent-1" letter-spacing="1">FRONTEND (TypeScript)</text>
    <text x="22" y="64" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3">Browser - JupyterLab UI</text>

    <!-- Settings Sync: x=27..166, y=72..152 -->
    <g id="settings-sync-card">
      <path d="M27,72 H166 V149 Q166,152 163,152 H30 Q27,152 27,149 Z" fill="#0096d1" fill-opacity="0.04"/>
      <path d="M27,72 H166 V149 Q166,152 163,152 H30 Q27,152 27,149 Z" fill="none" stroke="#0096d1" stroke-width="1"/>
      <rect x="27" y="72" width="139" height="5" fill="#0096d1" opacity="0.6"/>
      <text x="96" y="96"  font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" class="fg-1" text-anchor="middle">Settings Sync</text>
      <text x="96" y="112" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">ISettingRegistry</text>
      <text x="96" y="126" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">onChange handler</text>
      <text x="96" y="140" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">POST on change</text>
    </g>

    <!-- Terminal Tracker: x=180..326, y=72..152 -->
    <g id="terminal-tracker-card">
      <path d="M180,72 H326 V149 Q326,152 323,152 H183 Q180,152 180,149 Z" fill="#da8230" fill-opacity="0.04"/>
      <path d="M180,72 H326 V149 Q326,152 323,152 H183 Q180,152 180,149 Z" fill="none" stroke="#da8230" stroke-width="1"/>
      <rect x="180" y="72" width="146" height="5" fill="#da8230" opacity="0.6"/>
      <text x="253" y="96"  font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" class="fg-1" text-anchor="middle">Terminal Tracker</text>
      <text x="253" y="112" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">ITerminalTracker</text>
      <text x="253" y="126" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">isAttached check</text>
      <text x="253" y="140" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">+ !isDisposed guard</text>
    </g>

    <!-- Cull Results: x=27..166, y=162..240 -->
    <g id="cull-results-card">
      <path d="M27,162 H166 V237 Q166,240 163,240 H30 Q27,240 27,237 Z" fill="#0096d1" fill-opacity="0.04"/>
      <path d="M27,162 H166 V237 Q166,240 163,240 H30 Q27,240 27,237 Z" fill="none" stroke="#0096d1" stroke-width="1"/>
      <rect x="27" y="162" width="139" height="5" fill="#0096d1" opacity="0.6"/>
      <text x="96" y="186" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" class="fg-1" text-anchor="middle">Cull Results Poll</text>
      <text x="96" y="202" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">GET /cull-result</text>
      <text x="96" y="216" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">Toast notifications</text>
      <text x="96" y="230" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">consume-once pattern</text>
    </g>

    <!-- Interval Manager: x=180..326, y=162..240 -->
    <g id="interval-manager-card">
      <path d="M180,162 H326 V237 Q326,240 323,240 H183 Q180,240 180,237 Z" fill="#0096d1" fill-opacity="0.04"/>
      <path d="M180,162 H326 V237 Q326,240 323,240 H183 Q180,240 180,237 Z" fill="none" stroke="#0096d1" stroke-width="1"/>
      <rect x="180" y="162" width="146" height="5" fill="#0096d1" opacity="0.6"/>
      <text x="253" y="186" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" class="fg-1" text-anchor="middle">Interval Manager</text>
      <text x="253" y="202" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">cullCheckInterval</text>
      <text x="253" y="216" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">restart on change</text>
      <text x="253" y="230" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">drives poll + report</text>
    </g>
  </g>

  <!-- ================================================================ -->
  <!-- BACKEND CONTAINER x=460..788 -->
  <!-- ================================================================ -->
  <g id="backend-container">
    <path d="M460,30 H788 V277 Q788,280 785,280 H463 Q460,280 460,277 Z" fill="#0096d1" fill-opacity="0.02"/>
    <path d="M460,30 H788 V277 Q788,280 785,280 H463 Q460,280 460,277 Z" fill="none" stroke="#0096d1" stroke-width="0.8" opacity="0.25"/>
    <rect x="460" y="30" width="328" height="4" fill="#0096d1" opacity="0.15"/>
    <text x="470" y="50" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" class="accent-1" letter-spacing="1">BACKEND (Python)</text>
    <text x="470" y="64" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3">jupyter_server extension</text>

    <!-- ResourceCuller: x=475..645, y=72..185 -->
    <g id="resource-culler-card">
      <path d="M475,72 H645 V182 Q645,185 642,185 H478 Q475,185 475,182 Z" fill="#0096d1" fill-opacity="0.04"/>
      <path d="M475,72 H645 V182 Q645,185 642,185 H478 Q475,185 475,182 Z" fill="none" stroke="#0096d1" stroke-width="1"/>
      <rect x="475" y="72" width="170" height="5" fill="#0096d1" opacity="0.6"/>
      <text x="560" y="96"  font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" class="fg-1" text-anchor="middle">ResourceCuller</text>
      <text x="560" y="112" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">PeriodicCallback (tornado)</text>
      <text x="560" y="128" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">_cull_kernels()</text>
      <text x="560" y="143" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">_cull_terminals()</text>
      <text x="560" y="158" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">_cull_workspaces()</text>
      <text x="560" y="173" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">async coroutines</text>
    </g>

    <!-- HTTP Routes: x=659..774, y=72..185 -->
    <g id="http-routes-card">
      <path d="M659,72 H774 V182 Q774,185 771,185 H662 Q659,185 659,182 Z" fill="#da8230" fill-opacity="0.04"/>
      <path d="M659,72 H774 V182 Q774,185 771,185 H662 Q659,185 659,182 Z" fill="none" stroke="#da8230" stroke-width="1"/>
      <rect x="659" y="72" width="115" height="5" fill="#da8230" opacity="0.6"/>
      <text x="716" y="96"  font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" class="fg-1" text-anchor="middle">HTTP Routes</text>
      <text x="716" y="112" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">/settings</text>
      <text x="716" y="127" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">/active-terminals</text>
      <text x="716" y="142" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">/cull-result</text>
      <text x="716" y="157" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">/status</text>
      <text x="716" y="173" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">Tornado handlers</text>
    </g>

    <!-- State: x=475..774, y=195..270 -->
    <g id="state-card">
      <path d="M475,195 H774 V267 Q774,270 771,270 H478 Q475,270 475,267 Z" fill="#0096d1" fill-opacity="0.04"/>
      <path d="M475,195 H774 V267 Q774,270 771,270 H478 Q475,270 475,267 Z" fill="none" stroke="#0096d1" stroke-width="1"/>
      <rect x="475" y="195" width="299" height="5" fill="#0096d1" opacity="0.6"/>
      <text x="624" y="219" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" class="fg-1" text-anchor="middle">State</text>
      <text x="624" y="235" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">_active_terminals: set[str] from frontend tracker</text>
      <text x="624" y="250" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">_last_cull_result: consumed-once notification</text>
      <text x="624" y="265" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-3" text-anchor="middle">Settings: timeouts + enable flags</text>
    </g>
  </g>

  <!-- ================================================================ -->
  <!-- ARROWS through routing channel (x=340..460) -->
  <!-- Labels centred at x=400 with clear space around them -->
  <!-- ================================================================ -->

  <!-- Arrow 1: POST /settings (teal, left to right)
       Route: Settings Sync right (166,112) -> L-down to y=155 (between card rows)
       -> right through gap to channel -> across channel -> enter backend (475) -->
  <g id="arrow-post-settings">
    <path d="M166,112 H170 L174,116 V151 L178,155 H471" fill="none" stroke="#0096d1" stroke-width="1.2"/>
    <g transform="translate(475, 155) rotate(0)">
      <line x1="-4" y1="0" x2="-10" y2="0" stroke="#0096d1" stroke-width="1.2"/>
      <polygon points="0,0 -10,-4 -10,4" fill="#0096d1"/>
    </g>
    <text x="400" y="149" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="accent-1" text-anchor="middle">POST /settings</text>
  </g>

  <!-- Arrow 2: POST /active-terminals (orange, left to right)
       Route: Terminal Tracker right (326,112) -> straight through margin + channel -> backend (475)
       14px margin to container edge, 120px channel, 15px margin = 149px total -->
  <g id="arrow-post-terminals">
    <line x1="326" y1="112" x2="465" y2="112" stroke="#da8230" stroke-width="1.2"/>
    <g transform="translate(475, 112) rotate(0)">
      <line x1="-10" y1="0" x2="-10" y2="0" stroke="#da8230" stroke-width="1.2"/>
      <polygon points="0,0 -10,-4 -10,4" fill="#da8230"/>
    </g>
    <text x="400" y="106" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="accent-2" text-anchor="middle">POST /active-terminals</text>
  </g>

  <!-- Arrow 3: GET /cull-result (teal, right to left)
       Route: Backend (475,258) -> horizontal left at y=258 (18px below cards at y=240)
       -> to Cull Results card centre x=96 -> vertical arrow up to card bottom (240)
       Arrow tip at (96,240) pointing up, stem 8px, head 10px -->
  <g id="arrow-get-cull-result">
    <path d="M475,258 H100 L96,254 V250" fill="none" stroke="#0096d1" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(96, 240) rotate(-90)">
      <line x1="-10" y1="0" x2="-10" y2="0" stroke="#0096d1" stroke-width="1.2"/>
      <polygon points="0,0 -10,-4 -10,4" fill="#0096d1"/>
    </g>
    <text x="400" y="254" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="accent-1" text-anchor="middle">GET /cull-result</text>
  </g>

  <!-- ================================================================ -->
  <!-- LEGEND -->
  <!-- ================================================================ -->
  <g id="legend">
    <line x1="12" y1="296" x2="36" y2="296" stroke="#0096d1" stroke-width="1.2"/>
    <polygon points="33,293 39,296 33,299" fill="#0096d1"/>
    <text x="44" y="299" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="accent-1">Settings / polling flow</text>

    <line x1="200" y1="296" x2="224" y2="296" stroke="#da8230" stroke-width="1.2"/>
    <polygon points="221,293 227,296 221,299" fill="#da8230"/>
    <text x="232" y="299" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="accent-2">Terminal tab reporting</text>
  </g>

</svg>
